<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Fact or Bluff? — ITS Malta</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
 
:root {
  --navy: #00205b;
  --gold: #ffa300;
  --bg: #001233;
  --white: #ffffff;
}
 
html, body {
  width: 100%; height: 100%;
  background: var(--bg);
  font-family: 'DM Sans', sans-serif;
  overflow: hidden;
  touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
}
 
body::before {
  content: '';
  position: fixed; inset: 0; z-index: 0;
  background:
    radial-gradient(ellipse 100% 50% at 50% 0%, rgba(255,163,0,0.08) 0%, transparent 60%),
    repeating-linear-gradient(45deg, transparent, transparent 48px, rgba(255,163,0,0.025) 48px, rgba(255,163,0,0.025) 49px),
    repeating-linear-gradient(-45deg, transparent, transparent 48px, rgba(255,163,0,0.025) 48px, rgba(255,163,0,0.025) 49px);
  pointer-events: none;
}
 
/* ── SCREENS ───────────────────────────────────────────────── */
.screen {
  position: fixed; inset: 0; z-index: 300;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 40px 32px; text-align: center;
  background: var(--bg);
  transition: opacity 0.35s ease, visibility 0.35s;
}
.screen.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
 
.s-logo { width: 200px; border-radius: 12px; box-shadow: 0 16px 48px rgba(0,0,0,0.5); margin-bottom: 28px; }
.s-title { font-family: 'Playfair Display', serif; font-size: clamp(48px,11vw,88px); color: var(--gold); line-height:0.9; letter-spacing:-2px; margin-bottom:10px; }
.s-sub { font-size:11px; font-weight:700; letter-spacing:5px; text-transform:uppercase; color:rgba(255,255,255,0.3); margin-bottom:24px; }
.s-rule { width:48px; height:2px; background:var(--gold); opacity:0.35; margin:0 auto 24px; }
.s-body { font-size:16px; line-height:1.7; color:rgba(255,255,255,0.55); max-width:360px; margin-bottom:32px; }
 
.btn-gold {
  font-family:'DM Sans',sans-serif; font-size:14px; font-weight:700;
  letter-spacing:2.5px; text-transform:uppercase;
  background:var(--gold); color:var(--navy);
  border:none; border-radius:8px; padding:18px 52px; cursor:pointer;
  box-shadow:0 6px 28px rgba(255,163,0,0.3);
  transition:transform 0.1s;
}
.btn-gold:active { transform:scale(0.96); }
 
/* ── PLAYER MODAL ──────────────────────────────────────────── */
#modal-overlay {
  position:fixed; inset:0; z-index:400;
  background:rgba(0,8,32,0.9); backdrop-filter:blur(10px);
  display:flex; align-items:center; justify-content:center; padding:24px;
}
#modal-overlay.hidden { display:none; }
 
.modal {
  background:#001a4a; border:1px solid rgba(255,163,0,0.25);
  border-radius:16px; padding:32px 28px;
  width:100%; max-width:380px; text-align:center;
}
.modal-title { font-family:'Playfair Display',serif; font-size:26px; color:var(--gold); margin-bottom:6px; }
.modal-sub { font-size:12px; letter-spacing:2px; text-transform:uppercase; color:rgba(255,255,255,0.35); margin-bottom:24px; }
 
.count-row { display:flex; gap:10px; justify-content:center; margin-bottom:24px; }
.count-btn {
  width:52px; height:52px; border-radius:50%;
  border:2px solid rgba(255,163,0,0.25); background:transparent;
  color:rgba(255,255,255,0.5); font-family:'Playfair Display',serif;
  font-size:20px; cursor:pointer; transition:all 0.15s;
}
.count-btn.sel { border-color:var(--gold); background:rgba(255,163,0,0.12); color:var(--gold); }
 
.name-list { display:flex; flex-direction:column; gap:10px; margin-bottom:20px; }
.name-inp {
  background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1);
  border-radius:8px; color:white; font-family:'DM Sans',sans-serif;
  font-size:15px; padding:13px 16px; outline:none; text-align:center;
  transition:border-color 0.15s;
}
.name-inp:focus { border-color:rgba(255,163,0,0.45); }
.name-inp::placeholder { color:rgba(255,255,255,0.22); }
 
/* ── SCOREBAR ──────────────────────────────────────────────── */
#scorebar {
  position:fixed; top:0; left:0; right:0; height:56px; z-index:200;
  background:rgba(0,12,42,0.97); border-bottom:2px solid rgba(255,163,0,0.35);
  display:flex; align-items:center; justify-content:space-between;
  padding:0 18px; backdrop-filter:blur(10px);
}
.sb-brand { font-family:'Playfair Display',serif; font-size:16px; color:var(--gold); white-space:nowrap; }
.sb-players { display:flex; gap:8px; flex:1; justify-content:center; flex-wrap:nowrap; overflow:hidden; }
.p-chip {
  display:flex; align-items:center; gap:5px;
  background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.08);
  border-radius:20px; padding:4px 10px;
  font-size:12px; font-weight:600; color:rgba(255,255,255,0.5);
  white-space:nowrap; transition:all 0.2s;
  max-width:120px;
}
.p-chip.active { border-color:var(--gold); color:var(--gold); background:rgba(255,163,0,0.1); }
.p-dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; }
.sb-count { font-size:11px; font-weight:600; letter-spacing:1px; color:rgba(255,255,255,0.3); white-space:nowrap; }
 
/* ── STAGE ─────────────────────────────────────────────────── */
#stage {
  position:relative; z-index:1;
  width:100%; height:100%;
  display:flex; align-items:center; justify-content:center;
  padding:68px 16px 96px;
}
 
/* ── CARD ──────────────────────────────────────────────────── */
#card-wrap {
  position:relative;
  width: min(400px, min(80vw, 52vh));
  height: min(560px, min(112vw, 73vh));
  cursor:pointer;
  border-radius:18px;
  box-shadow:0 28px 64px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,163,0,0.1);
  overflow:hidden;
  /* flip animation via scale */
  transition:transform 0.18s ease;
}
 
#card-wrap.flipping { transform:scaleX(0); }
 
#card-img {
  pointer-events: none;
  width:100%; height:100%;
  object-fit:fill;
  display:block;
  border-radius:18px;
  pointer-events:none !important;
  user-select:none;
}
 
.tap-label {
  position:absolute; bottom:22px; left:0; right:0;
  text-align:center; font-size:11px; font-weight:700;
  letter-spacing:3px; text-transform:uppercase;
  color:rgba(255,163,0,0.5);
  animation:blink 2s ease-in-out infinite;
  pointer-events:none !important;
}
@keyframes blink { 0%,100%{opacity:0.25} 50%{opacity:0.9} }
 
/* card entrance */
@keyframes cardIn {
  from { opacity:0; transform:translateY(32px) scale(0.94); }
  to   { opacity:1; transform:translateY(0) scale(1); }
}
.card-enter { animation:cardIn 0.4s cubic-bezier(0.2,1,0.3,1) both; }
 
/* ── CONTROLS ──────────────────────────────────────────────── */
#controls {
  position:fixed; bottom:0; left:0; right:0; height:88px; z-index:200;
  background:rgba(0,12,42,0.97); border-top:2px solid rgba(255,163,0,0.2);
  display:flex; align-items:center; justify-content:center;
  gap:10px; padding:0 18px; backdrop-filter:blur(10px);
}
 
.c-btn {
  font-family:'DM Sans',sans-serif; font-size:13px; font-weight:700;
  letter-spacing:1.5px; text-transform:uppercase;
  border:none; border-radius:8px; height:52px; padding:0 20px;
  cursor:pointer; transition:transform 0.1s; touch-action:manipulation;
}
.c-btn:active { transform:scale(0.94); }
 
.c-next { background:var(--gold); color:var(--navy); flex:1; max-width:250px; font-size:14px; box-shadow:0 4px 20px rgba(255,163,0,0.2); }
.c-shuffle { background:rgba(255,255,255,0.06); color:rgba(255,255,255,0.45); border:1px solid rgba(255,255,255,0.1); }
.c-ok  { background:rgba(0,200,80,0.12); color:#3dffaa; border:1px solid rgba(0,200,80,0.25); }
.c-no  { background:rgba(255,80,20,0.1); color:#ff7755; border:1px solid rgba(255,80,20,0.2); }
.hidden-btn { display:none !important; }
 
/* score pop */
@keyframes pop { 0%{transform:scale(1)} 50%{transform:scale(1.3)} 100%{transform:scale(1)} }
.popping { animation:pop 0.28s ease; }
 
/* ── FINISH ────────────────────────────────────────────────── */
.finish-row {
  display:flex; justify-content:space-between; align-items:center;
  background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.08);
  border-radius:10px; padding:14px 20px; width:100%; max-width:320px;
}
</style>
</head>
<body>
 
<!-- WELCOME -->
<div id="welcome" class="screen">
  <img class="s-logo" src="https://raw.githubusercontent.com/janieogeah-collab/ITS-Playing-Cards/main/00_card_back.png" alt="ITS Malta">
  <div class="s-title">Fact or Bluff?</div>
  <div class="s-sub">ITS Malta Edition</div>
  <div class="s-rule"></div>
  <div class="s-body">30 cards. How well do you know ITS?<br>Draw a card, call it — win the prize.</div>
  <button class="btn-gold" onclick="openSetup()">▶ &nbsp;Start Playing</button>
</div>
 
<!-- PLAYER SETUP -->
<div id="modal-overlay" class="hidden">
  <div class="modal">
    <div class="modal-title">Players</div>
    <div class="modal-sub">How many are playing?</div>
    <div class="count-row">
      <button class="count-btn sel" onclick="setCount(1)">1</button>
      <button class="count-btn"     onclick="setCount(2)">2</button>
      <button class="count-btn"     onclick="setCount(3)">3</button>
      <button class="count-btn"     onclick="setCount(4)">4</button>
    </div>
    <div class="name-list" id="name-list"></div>
    <button class="btn-gold" style="width:100%" onclick="beginGame()">Let's Go →</button>
  </div>
</div>
 
<!-- FINISHED -->
<div id="finished" class="screen hidden">
  <div class="s-title" style="font-size:clamp(36px,8vw,64px);margin-bottom:12px">Game Over!</div>
  <div class="s-sub">All 30 cards played</div>
  <div class="s-rule"></div>
  <div id="leaderboard" style="display:flex;flex-direction:column;gap:10px;width:100%;max-width:340px;margin-bottom:28px;"></div>
  <div class="s-body" style="font-size:14px;margin-bottom:24px">Discover our programmes at <strong style="color:var(--gold)">its.edu.mt</strong></div>
  <button class="btn-gold" onclick="openSetup()">↺ Play Again</button>
</div>
 
<!-- SCOREBAR -->
<div id="scorebar">
  <div class="sb-brand">Fact or Bluff?</div>
  <div class="sb-players" id="sb-players"></div>
  <div class="sb-count" id="sb-count">1 / 30</div>
</div>
 
<!-- STAGE -->
<div id="stage">
  <div id="card-wrap" onclick="handleTap()">
    <img id="card-img"
         src="https://raw.githubusercontent.com/janieogeah-collab/ITS-Playing-Cards/main/00_card_back.png"
         alt="card">
    <div class="tap-label" id="tap-label">Tap to reveal</div>
  </div>
</div>
 
<!-- CONTROLS -->
<div id="controls">
  <button class="c-btn c-shuffle" onclick="resetDeck()">↺</button>
  <button class="c-btn c-no  hidden-btn" id="btn-no"  onclick="score(false)">✗ Wrong</button>
  <button class="c-btn c-next"           id="btn-next" onclick="nextCard()">Next Card →</button>
  <button class="c-btn c-ok  hidden-btn" id="btn-ok"  onclick="score(true)">✓ Correct</button>
</div>
 
<script>
const BASE  = 'https://raw.githubusercontent.com/janieogeah-collab/ITS-Playing-Cards/main/';
const BACK  = BASE + '00_card_back.png';
const FACES = [
  '01_face_fact.png','02_face_fact.png','03_face_bluff.png','04_face_fact.png',
  '05_face_bluff.png','06_face_fact.png','07_face_bluff.png','08_face_fact.png',
  '09_face_bluff.png','10_face_fact.png','11_face_bluff.png','12_face_fact.png',
  '13_face_bluff.png','14_face_fact.png','15_face_bluff.png','16_face_fact.png',
  '17_face_bluff.png','18_face_fact.png','19_face_bluff.png','20_face_fact.png',
  '21_face_bluff.png','22_face_fact.png','23_face_bluff.png','24_face_fact.png',
  '25_face_fact.png','26_face_fact.png','27_face_bluff.png','28_face_fact.png',
  '29_face_bluff.png','30_face_fact.png',
];
const COLOURS = ['#ffa300','#10c0f1','#ff88dc','#d8e265'];
 
let players=[], active=0, deck=[], idx=0, revealed=false, pCount=1;
 
/* ── helpers ── */
const $  = id => document.getElementById(id);
const sh = (id, show) => $('btn-'+id).classList.toggle('hidden-btn', !show);
 
function shuffle(a){ const b=[...a]; for(let i=b.length-1;i>0;i--){const j=0|Math.random()*(i+1);[b[i],b[j]]=[b[j],b[i]];} return b; }
 
/* ── setup ── */
function openSetup(){
  $('welcome').classList.add('hidden');
  $('finished').classList.add('hidden');
  $('modal-overlay').classList.remove('hidden');
  setCount(1);
}
 
function setCount(n){
  pCount=n;
  document.querySelectorAll('.count-btn').forEach((b,i)=>b.classList.toggle('sel',i+1===n));
  const list=$('name-list'); list.innerHTML='';
  for(let i=0;i<n;i++){
    const inp=document.createElement('input');
    inp.className='name-inp'; inp.placeholder=`Player ${i+1} name`;
    inp.id=`ni_${i}`; inp.style.borderColor=COLOURS[i]+'44';
    list.appendChild(inp);
  }
}
 
function beginGame(){
  players=[];
  for(let i=0;i<pCount;i++){
    const v=$(`ni_${i}`); 
    players.push({name:v&&v.value.trim()||`Player ${i+1}`, score:0, col:COLOURS[i]});
  }
  active=0;
  $('modal-overlay').classList.add('hidden');
  buildBar(); resetDeck();
}
 
/* ── scorebar ── */
function buildBar(){
  const sb=$('sb-players'); sb.innerHTML='';
  players.forEach((p,i)=>{
    const d=document.createElement('div');
    d.className='p-chip'+(i===active?' active':'');
    d.id=`pc_${i}`;
    d.innerHTML=`<span class="p-dot" style="background:${p.col}"></span>${p.name}:<span id="ps_${i}" style="margin-left:3px">0</span>`;
    sb.appendChild(d);
  });
}
function refreshBar(){
  players.forEach((p,i)=>{
    const c=$(`pc_${i}`); if(c) c.className='p-chip'+(i===active?' active':'');
    const s=$(`ps_${i}`); if(s) s.textContent=p.score;
  });
  $('sb-count').textContent=`${idx+1} / ${deck.length}`;
}
 
/* ── card logic ── */
function resetDeck(){
  deck=shuffle([...Array(FACES.length).keys()]);
  idx=0; active=0;
  players.forEach(p=>p.score=0);
  buildBar(); showCard(BACK, false);
  ctrlState(false);
}
 
function showCard(src, isRevealed){
  revealed=isRevealed;
  const wrap=$('card-wrap'), img=$('card-img');
  // scale-collapse → swap → scale-expand
  wrap.classList.add('flipping');
  img.onload = () => {
    wrap.classList.remove('flipping');
    if(!isRevealed){
      wrap.classList.remove('card-enter');
      void wrap.offsetWidth;
      wrap.classList.add('card-enter');
    }
    img.onload = null;
  };
  setTimeout(()=>{ img.src = src; }, 160);
  $('tap-label').style.display = isRevealed ? 'none' : 'block';
  ctrlState(isRevealed);
  refreshBar();
}
 
function handleTap(){
  // Auto-start single player if setup skipped
  if(!players.length){
    players=[{name:'Player 1', score:0, col:COLOURS[0]}];
    active=0;
    buildBar();
    if(!deck.length) resetDeck();
  }
  if(!revealed){
    showCard(BASE + FACES[deck[idx]], true);
  }
}
 
function ctrlState(isRevealed){
  const multi = players.length > 1;
  sh('next', !multi || !isRevealed);
  sh('ok',    multi  &&  isRevealed);
  sh('no',    multi  &&  isRevealed);
}
 
function score(correct){
  if(correct){
    players[active].score++;
    const el=$(`ps_${active}`);
    el.classList.remove('popping'); void el.offsetWidth; el.classList.add('popping');
  }
  active=(active+1)%players.length;
  nextCard();
}
 
function nextCard(){
  idx++;
  if(idx>=deck.length){ showFinished(); return; }
  showCard(BACK, false);
  refreshBar();
}
 
/* ── finish ── */
function showFinished(){
  const board=$('leaderboard'); board.innerHTML='';
  [...players].sort((a,b)=>b.score-a.score).forEach((p,i)=>{
    const row=document.createElement('div');
    row.className='finish-row';
    row.innerHTML=`
      <span style="display:flex;align-items:center;gap:10px">
        <span style="width:10px;height:10px;border-radius:50%;background:${p.col};display:inline-block"></span>
        <span style="color:white;font-weight:600;font-size:15px">${i===0?'🏆 ':''}${p.name}</span>
      </span>
      <span style="color:var(--gold);font-family:'Playfair Display',serif;font-size:26px;font-weight:700">${p.score}</span>`;
    board.appendChild(row);
  });
  $('finished').classList.remove('hidden');
}
 
/* ── keyboard ── */
document.addEventListener('keydown',e=>{
  if(e.code==='Space'||e.code==='ArrowRight'){ e.preventDefault(); revealed?nextCard():handleTap(); }
  if(e.code==='ArrowUp'||e.code==='ArrowDown'){ e.preventDefault(); handleTap(); }
  if(e.code==='KeyC') { if(revealed) score(true); }
  if(e.code==='KeyX') { if(revealed) score(false); }
});
</script>
</body>
</html>
